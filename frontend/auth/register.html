<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Register | Online Store</title>

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <style>
    body {
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .register-card {
      width: 100%;
      max-width: 480px;
      padding: 30px;
      border-radius: 18px;
      background: #fff;
      box-shadow: 0 6px 25px rgba(0, 0, 0, 0.1);
    }

    .register-card h3 {
      font-weight: 600;
      margin-bottom: 20px;
    }

    .form-control:focus {
      box-shadow: none;
      border-color: #0d6efd;
    }

    .btn-custom {
      padding: 10px;
      font-size: 17px;
      border-radius: 10px;
    }

    a {
      text-decoration: none;
    }
  </style>
</head>

<body>
  <div class="register-card">
    <h3 class="text-center mb-4">Kayıt Ol</h3>

    <form id="registerForm">
      <div class="mb-3">
        <label class="form-label">Ad Soyad</label>
        <input
          type="text"
          class="form-control"
          id="fullname"
          required
          placeholder="Adınız Soyadınız"
        />
      </div>

      <div class="mb-3">
        <label class="form-label">E-mail</label>
        <input
          type="email"
          class="form-control"
          id="email"
          required
          placeholder="example@mail.com"
        />
      </div>

      <div class="mb-3">
        <label class="form-label">Şifre</label>
        <input
          type="password"
          class="form-control"
          id="password"
          required
          placeholder="••••••••"
        />
      </div>

      <div class="mb-3">
        <label class="form-label">Şifre Tekrar</label>
        <input
          type="password"
          class="form-control"
          id="password2"
          required
          placeholder="Şifrenizi tekrar girin"
        />
      </div>

      <button type="submit" class="btn btn-primary w-100 btn-custom">
        Kaydol
      </button>
    </form>

    <div class="text-center mt-3">
      <small>
        Zaten hesabın var mı?
        <a class="text-primary" href="login.html">Giriş yap</a>
      </small>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Basit Register Script -->
  <script>
    const form = document.getElementById("registerForm");

    form.addEventListener("submit", (e) => {
      e.preventDefault();

      const fullname = document.getElementById("fullname").value.trim();
      const email = document.getElementById("email").value.trim();
      const pass1 = document.getElementById("password").value.trim();
      const pass2 = document.getElementById("password2").value.trim();

      if (!fullname || !email || !pass1 || !pass2) {
        alert("Lütfen tüm alanları doldurun.");
        return;
      }

      if (pass1 !== pass2) {
        alert("Şifreler uyuşmuyor!");
        return;
      }

      alert("Kayıt başarılı gibi düşünebilirsin :)");
    });
  </script>
</body>
</html>
