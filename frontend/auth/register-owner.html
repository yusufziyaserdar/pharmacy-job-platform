<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eczane Sahibi Kaydı</title>

    <!-- Bootstrap -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
        rel="stylesheet"
    />
</head>
<body class="bg-light">

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">

                <div class="card shadow-sm">
                    <div class="card-body p-4">

                        <h3 class="text-center mb-4">Eczane Sahibi Kayıt</h3>

                        <form>

                            <!-- Ad Soyad -->
                            <div class="mb-3">
                                <label class="form-label">Ad Soyad</label>
                                <input type="text" class="form-control" placeholder="Adınızı ve soyadınızı girin" required />
                            </div>

                            <!-- E-posta -->
                            <div class="mb-3">
                                <label class="form-label">E-posta</label>
                                <input type="email" class="form-control" placeholder="E-posta adresiniz" required />
                            </div>

                            <!-- Telefon -->
                            <div class="mb-3">
                                <label class="form-label">Telefon</label>
                                <input type="tel" class="form-control" placeholder="05xx xxx xx xx" required />
                            </div>

                            <!-- Eczane Adı -->
                            <div class="mb-3">
                                <label class="form-label">Eczane Adı</label>
                                <input type="text" class="form-control" placeholder="Örn: Şifa Eczanesi" required />
                            </div>

                            <!-- Eczane Adresi -->
                            <div class="mb-3">
                                <label class="form-label">Eczane Adresi</label>
                                <textarea class="form-control" rows="3" placeholder="Eczanenin adresini yazın" required></textarea>
                            </div>

                            <!-- Şifre -->
                            <div class="mb-3">
                                <label class="form-label">Şifre</label>
                                <input type="password" class="form-control" placeholder="Şifre oluşturun" required />
                            </div>

                            <!-- Şifre tekrar -->
                            <div class="mb-3">
                                <label class="form-label">Şifre (Tekrar)</label>
                                <input type="password" class="form-control" placeholder="Şifreyi tekrar girin" required />
                            </div>

                            <!-- Buton -->
                            <button type="submit" class="btn btn-primary w-100 mt-2">Kaydol</button>

                        </form>

                        <p class="text-center mt-3">
                            Zaten hesabınız var mı?
                            <a href="./login.html">Giriş yapın</a>
                        </p>

                    </div>
                </div>

            </div>
        </div>
    </div>

</body>
</html>
